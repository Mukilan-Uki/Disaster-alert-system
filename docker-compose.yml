version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: disaster_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build: ./server
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/disaster_db
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  db_data:
